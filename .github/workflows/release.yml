name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write # create the version PR / tags
  pull-requests: write # open the "Version Packages" PR
  id-token: write # required for npm provenance (OIDC)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build

      # On a push that contains changesets, opens/updates a "Version Packages" PR.
      # On a push where versions were just bumped (PR merged), publishes to npm.
      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: npx changeset version
          publish: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # `NPM_TOKEN` makes changesets/action publish with the token directly.
          # Without it, the action sees OIDC available and attempts npm "trusted
          # publishing", which isn't configured for a brand-new package — its fallback
          # then demands a 2FA OTP that CI can't provide. `NODE_AUTH_TOKEN` backs the
          # .npmrc that actions/setup-node wrote. Provenance still attaches via id-token.
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
