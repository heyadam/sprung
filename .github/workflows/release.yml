name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write # create the version PR / tags
  pull-requests: write # open the "Version Packages" PR
  id-token: write # required for npm provenance (OIDC)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      # OIDC "trusted publishing" needs npm >= 11.5.1; Node 22 bundles npm 10.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run build

      # On a push that contains changesets, opens/updates a "Version Packages" PR.
      # On a push where versions were just bumped (PR merged), publishes to npm.
      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: npx changeset version
          publish: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Auth is via npm OIDC "trusted publishing" (configured on npmjs.com for
          # heyadam/sprung + release.yml), so no token is needed: changesets/action
          # exchanges the `id-token: write` OIDC token for a short-lived publish
          # credential, and provenance is generated automatically.
          NPM_CONFIG_PROVENANCE: "true"
